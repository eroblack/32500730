<!DOCTYPE html>
<html lang="ht">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eroblack Pro Roulette</title>
    <style>
        body { margin: 0; background: radial-gradient(circle, #1a1a1a, #000); color: white; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        
        #ui-top { text-align: center; margin-bottom: 10px; z-index: 10; }
        h2 { color: #ff0033; margin: 5px; text-shadow: 0 0 10px #ff0033; }
        
        #controls { background: rgba(255,255,255,0.1); padding: 15px; border-radius: 15px; border: 1px solid #ff0033; margin-bottom: 20px; display: flex; flex-direction: column; align-items: center; }
        
        input { background: #000; color: #ff0033; border: 2px solid #ff0033; padding: 10px; border-radius: 8px; width: 60px; text-align: center; font-size: 20px; font-weight: bold; margin-bottom: 10px; }
        
        #wheel-container { position: relative; }
        #pointer { position: absolute; top: -15px; left: 50%; transform: translateX(-50%); width: 0; height: 0; border-left: 15px solid transparent; border-right: 15px solid transparent; border-top: 30px solid #fff; z-index: 10; filter: drop-shadow(0 0 5px #000); }
        
        canvas { border: 8px solid #333; border-radius: 50%; box-shadow: 0 0 30px rgba(255, 0, 51, 0.5); }
        
        #spin-btn { margin-top: 20px; padding: 15px 50px; font-size: 18px; font-weight: bold; color: white; background: linear-gradient(45deg, #ff0033, #99001a); border: none; border-radius: 50px; cursor: pointer; text-transform: uppercase; transition: 0.3s; }
        #spin-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        
        #result-display { margin-top: 15px; font-size: 22px; font-weight: bold; height: 30px; color: #00ffcc; }
    </style>
</head>
<body>

    <div id="ui-top">
        <h2>EROBLACK CASINO</h2>
        <div id="result-display"></div>
    </div>

    <div id="controls">
        <label style="font-size: 12px; margin-bottom: 5px;">CHWAZI YON CHIF (0-31)</label>
        <input type="number" id="userNumber" min="0" max="31" value="7">
        <button id="spin-btn" onclick="spinWheel()">START</button>
    </div>

    <div id="wheel-container">
        <div id="pointer"></div>
        <canvas id="wheel" width="320" height="320"></canvas>
    </div>

<script>
    // Koneksyon ak Sketchware
    function sendToApp(key, value) {
        if (window.Zandron) {
            window.Zandron.showData(key, value);
        }
        console.log("App -> " + key + ": " + value);
    }

    const canvas = document.getElementById("wheel");
    const ctx = canvas.getContext("2d");
    const resultDisplay = document.getElementById("result-display");
    
    // Nou itilize 32 chif (0 a 31)
    const sectors = Array.from({length: 32}, (_, i) => i);
    const colors = sectors.map(i => i % 2 === 0 ? "#ff0033" : "#111");
    
    let arc = Math.PI / (sectors.length / 2);
    let startAngle = 0;
    let spinTimeout = null;
    let spinAngleStart = 0;
    let spinTime = 0;
    let spinTimeTotal = 0;

    function drawWheel() {
        ctx.clearRect(0, 0, 320, 320);
        for (let i = 0; i < sectors.length; i++) {
            let angle = startAngle + i * arc;
            ctx.fillStyle = colors[i];
            ctx.beginPath();
            ctx.arc(160, 160, 150, angle, angle + arc, false);
            ctx.lineTo(160, 160);
            ctx.fill();
            ctx.strokeStyle = "rgba(255,255,255,0.2)";
            ctx.stroke();

            ctx.save();
            ctx.fillStyle = "white";
            ctx.translate(160 + Math.cos(angle + arc / 2) * 125, 160 + Math.sin(angle + arc / 2) * 125);
            ctx.rotate(angle + arc / 2 + Math.PI / 2);
            ctx.font = 'bold 10px Arial';
            ctx.fillText(sectors[i], -ctx.measureText(sectors[i]).width / 2, 0);
            ctx.restore();
        }
        
        // Sèk nan mitan
        ctx.fillStyle = "#222";
        ctx.beginPath();
        ctx.arc(160, 160, 35, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = "#ff0033";
        ctx.lineWidth = 2;
        ctx.stroke();
        
        ctx.fillStyle = "white";
        ctx.font = "bold 9px Arial";
        ctx.textAlign = "center";
        ctx.fillText("EROBLACK", 160, 163);
    }

    function spinWheel() {
        const userNum = parseInt(document.getElementById("userNumber").value);
        if (isNaN(userNum) || userNum < 0 || userNum > 31) {
            alert("Tanpri chwazi yon nimewo ant 0 ak 31");
            return;
        }

        resultDisplay.innerText = "Vire ap vire...";
        document.getElementById("spin-btn").disabled = true;
        spinAngleStart = Math.random() * 10 + 10;
        spinTime = 0;
        spinTimeTotal = Math.random() * 3 + 4 * 1000;
        rotateWheel();
    }

    function rotateWheel() {
        spinTime += 30;
        if (spinTime >= spinTimeTotal) {
            stopRotateWheel();
            return;
        }
        let spinAngle = spinAngleStart - easeOut(spinTime, 0, spinAngleStart, spinTimeTotal);
        startAngle += (spinAngle * Math.PI / 180);
        drawWheel();
        spinTimeout = setTimeout(rotateWheel, 30);
    }

    function stopRotateWheel() {
        clearTimeout(spinTimeout);
        let degrees = startAngle * 180 / Math.PI + 90;
        let arcd = arc * 180 / Math.PI;
        let index = Math.floor((360 - degrees % 360) / arcd);
        let winningNumber = sectors[index];
        let userNum = parseInt(document.getElementById("userNumber").value);

        if (winningNumber === userNum) {
            resultDisplay.style.color = "#00ffcc";
            resultDisplay.innerText = "OU GANYEN: " + winningNumber + "!";
            // VOYE 25 NAN SCORE A
            sendToApp("edittextScore", "25");
        } else {
            resultDisplay.style.color = "#ff0033";
            resultDisplay.innerText = "PÈDI! SE TE: " + winningNumber;
        }

        // VOYE "fini" TOUT TAN
        sendToApp("edittextFini", "fini");

        document.getElementById("spin-btn").disabled = false;
    }

    function easeOut(t, b, c, d) {
        let ts = (t /= d) * t;
        let tc = ts * t;
        return b + c * (tc + -3 * ts + 3 * t);
    }

    drawWheel();
</script>
</body>
</html>
