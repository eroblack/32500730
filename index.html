<!DOCTYPE html>
<html lang="hat">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lis Rechèch ak Lyen</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; background-color: #f4f4f4; }
        .search-box { width: 100%; padding: 10px; margin-bottom: 20px; border: 1px solid #ccc; border-radius: 5px; }
        ul { list-style: none; padding: 0; }
        li { background: white; margin-bottom: 5px; border-radius: 5px; transition: 0.3s; }
        li a { display: block; padding: 15px; text-decoration: none; color: #333; font-weight: bold; }
        li:hover { background: #e0e0e0; }
    </style>
</head>
<body>

    <h2>Lis mwen an</h2>

    <input type="text" id="myInput" onkeyup="filtrerLis()" placeholder="Tape yon non pou chèche..." class="search-box">

    <ul id="myUL">
        <li><a href="https://google.com">K1 - Louvri Google</a></li>
        <li><a href="https://youtube.com">K2 - Louvri YouTube</a></li>
        <li><a href="https://facebook.com">K3 - Louvri Facebook</a></li>
        <li><a href="paj-pa-w.html">K4 - Paj pa w la</a></li>
        <li><a href="https://eroblack.github.io/Eroblack/#">K5 - Paj eroblack la</a></li>
    </ul>

    <script>
        function filtrerLis() {
            var input, filter, ul, li, a, i, txtValue;
            input = document.getElementById("myInput");
            filter = input.value.toUpperCase();
            ul = document.getElementById("myUL");
            li = ul.getElementsByTagName("li");

            for (i = 0; i < li.length; i++) {
                a = li[i].getElementsByTagName("a")[0];
                txtValue = a.textContent || a.innerText;
                if (txtValue.toUpperCase().indexOf(filter) > -1) {
                    li[i].style.display = "";
                } else {
                    li[i].style.display = "none";
                }
            }
        }
    </script>

</body>
</html>
